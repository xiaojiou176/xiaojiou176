<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu GitHub profile hero v7</title>
  <desc id="desc">Minimal author-poster hero for Terry Yu with a more human, less robotic presentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#EEE4D5"/>
    </linearGradient>
    <linearGradient id="door1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="door2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="door3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3730A3"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="1560" height="520" rx="36" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="520" rx="36" stroke="#1C1917" stroke-width="2"/>

  <circle cx="1296" cy="118" r="84" fill="#C4B5FD" fill-opacity="0.34"/>
  <circle cx="1436" cy="208" r="110" fill="#BFDBFE" fill-opacity="0.30"/>
  <circle cx="1214" cy="334" r="98" fill="#99F6E4" fill-opacity="0.28"/>

  <rect x="88" y="76" width="160" height="32" rx="16" fill="#111827"/>
  <text x="114" y="97" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">AUTHOR PAGE</text>

  <text x="88" y="182" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700">Terry Yu</text>
  <text x="88" y="262" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">Readable, reviewable</text>
  <text x="88" y="328" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">AI products</text>

  <text x="90" y="388" fill="#44403C" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Read • Decide • Orchestrate</text>
  <text x="90" y="430" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.6">BUILT IN SEATTLE, WA (PT)</text>

  <rect x="844" y="110" width="184" height="270" rx="36" fill="url(#door1)"/>
  <rect x="1050" y="136" width="184" height="244" rx="36" fill="url(#door2)"/>
  <rect x="1256" y="90" width="184" height="290" rx="36" fill="url(#door3)"/>
</svg>
