<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu GitHub profile hero v8</title>
  <desc id="desc">Animated author-page hero for Terry Yu with three flagship product windows and subtle route motion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EC">
        <animate attributeName="stop-color" values="#F8F4EC;#F5EFE6;#F8F4EC" dur="18s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#E9DDCD">
        <animate attributeName="stop-color" values="#E9DDCD;#E5D7C4;#E9DDCD" dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="routeA" x1="280" y1="0" x2="1240" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.45" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="cardInk" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1560" height="600" rx="40" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="600" rx="40" stroke="#1C1917" stroke-width="2"/>

  <circle cx="1288" cy="120" r="92" fill="#C4B5FD" fill-opacity="0.28">
    <animate attributeName="opacity" values="0.18;0.30;0.18" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1440" cy="214" r="122" fill="#BFDBFE" fill-opacity="0.24">
    <animate attributeName="opacity" values="0.14;0.26;0.14" dur="13s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1180" cy="420" r="108" fill="#A7F3D0" fill-opacity="0.22">
    <animate attributeName="opacity" values="0.12;0.24;0.12" dur="9s" repeatCount="indefinite"/>
  </circle>

  <rect x="88" y="76" width="176" height="34" rx="17" fill="#111827"/>
  <text x="114" y="98" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">AUTHOR PAGE</text>

  <text x="88" y="186" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700">Terry Yu</text>
  <text x="88" y="264" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">Readable systems</text>
  <text x="88" y="326" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">for real decisions</text>

  <text x="90" y="390" fill="#44403C" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="600">Local-first AI products for reading, deciding, orchestrating, and proving work.</text>
  <text x="90" y="430" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.7">BUILT IN SEATTLE, WA (PT) • BUILT IN PUBLIC</text>
  <text x="90" y="484" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Front row first. The full showroom next.</text>
  <text x="90" y="516" fill="#57534E" font-family="Inter, Arial, sans-serif" font-size="16">Three flagship products carry the first-screen story: Read, Decide, Orchestrate.</text>

  <path d="M540 210C690 210 760 164 858 164" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14">
    <animate attributeName="stroke-dashoffset" values="0;-240" dur="12s" repeatCount="indefinite"/>
  </path>
  <path d="M540 270C700 270 790 254 1050 254" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14">
    <animate attributeName="stroke-dashoffset" values="0;-220" dur="10s" repeatCount="indefinite"/>
  </path>
  <path d="M540 332C704 332 812 190 1260 190" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14">
    <animate attributeName="stroke-dashoffset" values="0;-260" dur="14s" repeatCount="indefinite"/>
  </path>

  <circle cx="856" cy="164" r="8" fill="#0F766E">
    <animate attributeName="r" values="7;10;7" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="254" r="8" fill="#0EA5E9">
    <animate attributeName="r" values="7;10;7" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1260" cy="190" r="8" fill="#3730A3">
    <animate attributeName="r" values="7;10;7" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g filter="url(#shadow)">
    <rect x="856" y="118" width="212" height="188" rx="30" fill="url(#cardInk)"/>
    <rect x="1088" y="196" width="212" height="188" rx="30" fill="url(#cardTeal)"/>
    <rect x="1290" y="104" width="212" height="212" rx="30" fill="url(#cardBlue)"/>
  </g>

  <text x="886" y="154" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">SOURCEHARBOR</text>
  <text x="886" y="178" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">READ</text>
  <rect x="886" y="198" width="150" height="12" rx="6" fill="#E2E8F0" fill-opacity="0.82"/>
  <rect x="886" y="222" width="122" height="10" rx="5" fill="#E2E8F0" fill-opacity="0.62"/>
  <rect x="886" y="246" width="138" height="10" rx="5" fill="#E2E8F0" fill-opacity="0.62"/>
  <rect x="886" y="270" width="94" height="10" rx="5" fill="#A7F3D0" fill-opacity="0.85"/>

  <text x="1118" y="232" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">OPENCAMPUS</text>
  <text x="1118" y="256" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">DECIDE</text>
  <circle cx="1140" cy="294" r="12" fill="#CCFBF1" fill-opacity="0.9"/>
  <circle cx="1204" cy="294" r="12" fill="#99F6E4" fill-opacity="0.55"/>
  <circle cx="1268" cy="294" r="12" fill="#99F6E4" fill-opacity="0.55"/>
  <path d="M1152 294H1256" stroke="#CCFBF1" stroke-width="4" stroke-linecap="round"/>
  <rect x="1118" y="326" width="138" height="12" rx="6" fill="#ECFEFF" fill-opacity="0.78"/>

  <text x="1320" y="144" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">OPENVIBECODING</text>
  <text x="1320" y="168" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.2">ORCHESTRATE</text>
  <rect x="1320" y="194" width="150" height="16" rx="8" fill="#DBEAFE" fill-opacity="0.82"/>
  <rect x="1320" y="226" width="72" height="14" rx="7" fill="#A7F3D0" fill-opacity="0.82"/>
  <rect x="1402" y="226" width="68" height="14" rx="7" fill="#BFDBFE" fill-opacity="0.72"/>
  <rect x="1320" y="258" width="150" height="14" rx="7" fill="#DBEAFE" fill-opacity="0.52"/>
  <rect x="1320" y="290" width="112" height="14" rx="7" fill="#E0E7FF" fill-opacity="0.52"/>

  <text x="862" y="580" fill="#57534E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">READ • DECIDE • ORCHESTRATE</text>
</svg>
