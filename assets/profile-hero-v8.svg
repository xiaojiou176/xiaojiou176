<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu GitHub profile hero v8</title>
  <desc id="desc">Minimal author-page hero for Terry Yu with three flagship doors and a simplified route structure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EC"/>
      <stop offset="1" stop-color="#E9DDCD"/>
    </linearGradient>
    <linearGradient id="routeA" x1="360" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.45" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="cardInk" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cardTeal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1560" height="600" rx="40" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="600" rx="40" stroke="#1C1917" stroke-width="2"/>

  <circle cx="1316" cy="176" r="92" fill="#C4B5FD" fill-opacity="0.18"/>

  <rect x="88" y="76" width="176" height="34" rx="17" fill="#111827"/>
  <text x="114" y="98" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">AUTHOR PAGE</text>

  <text x="88" y="186" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700">Terry Yu</text>
  <text x="88" y="264" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">Readable systems</text>
  <text x="88" y="326" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700">for real decisions</text>

  <text x="90" y="390" fill="#44403C" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="600">Local-first AI products for reading, deciding, orchestrating, and proving work.</text>
  <text x="90" y="430" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.7">SEATTLE, WA (PT)</text>
  <text x="90" y="484" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Front row first. The full showroom next.</text>

  <path d="M612 252C738 252 796 214 930 214" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M612 308C760 308 844 308 1126 308" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M612 364C748 364 846 258 1320 258" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>

  <g filter="url(#shadow)">
    <rect x="930" y="160" width="210" height="110" rx="28" fill="url(#cardInk)"/>
    <rect x="1130" y="254" width="210" height="110" rx="28" fill="url(#cardTeal)"/>
    <rect x="1320" y="152" width="210" height="110" rx="28" fill="url(#cardBlue)"/>
  </g>

  <circle cx="930" cy="214" r="8" fill="#0F766E"/>
  <circle cx="1130" cy="308" r="8" fill="#0EA5E9"/>
  <circle cx="1320" cy="258" r="8" fill="#3730A3"/>

  <text x="962" y="206" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">SOURCEHARBOR</text>
  <text x="962" y="236" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">READ</text>

  <text x="1162" y="300" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">OPENCAMPUS</text>
  <text x="1162" y="330" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">DECIDE</text>

  <text x="1352" y="198" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">OPENVIBECODING</text>
  <text x="1352" y="228" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">ORCHESTRATE</text>
</svg>
