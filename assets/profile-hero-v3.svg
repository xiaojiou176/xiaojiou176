<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu profile hero</title>
  <desc id="desc">A cleaner poster-style hero for Terry Yu's GitHub profile, emphasizing author identity, product thesis, and the three core verbs.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7DF9E4"/>
      <stop offset="1" stop-color="#33D1C6"/>
    </linearGradient>
    <linearGradient id="ice" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C7E1FF"/>
      <stop offset="1" stop-color="#84B6FF"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E0D4FF"/>
      <stop offset="1" stop-color="#BFA8FF"/>
    </linearGradient>
  </defs>

  <rect x="24" y="20" width="1232" height="380" rx="36" fill="url(#bg)"/>
  <circle cx="1032" cy="96" r="118" fill="#7C3AED" fill-opacity="0.16"/>
  <circle cx="1110" cy="244" r="96" fill="#2563EB" fill-opacity="0.16"/>
  <circle cx="918" cy="286" r="68" fill="#14B8A6" fill-opacity="0.13"/>

  <rect x="88" y="76" width="188" height="32" rx="16" fill="#0B1324" stroke="#2B3954"/>
  <text x="112" y="97" fill="#D8E1F1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">author page • Seattle</text>

  <text x="88" y="166" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="62" font-weight="800">Terry Yu</text>
  <text x="88" y="214" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="720">Readable, reviewable, evidence-backed AI products</text>
  <text x="88" y="246" fill="#B6C2D4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="580">AI systems for reading, deciding, orchestrating, and proving work.</text>

  <rect x="88" y="284" width="140" height="30" rx="15" fill="#101A2A"/>
  <rect x="240" y="284" width="154" height="30" rx="15" fill="#101A2A"/>
  <rect x="406" y="284" width="198" height="30" rx="15" fill="#101A2A"/>
  <text x="132" y="304" fill="url(#mint)" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800">READ</text>
  <text x="290" y="304" fill="url(#ice)" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800">DECIDE</text>
  <text x="456" y="304" fill="url(#violet)" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800">ORCHESTRATE</text>

  <text x="88" y="350" fill="#7DF9E4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">Front row</text>
  <text x="168" y="350" fill="#D8E1F1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">SourceHarbor  •  campus-copilot  •  CortexPilot-public</text>

  <text x="820" y="150" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800">Build what matters.</text>
  <text x="820" y="188" fill="#B6C2D4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="560">Not another model wrapper.</text>
  <text x="820" y="214" fill="#B6C2D4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="560">Products people can read, review, trust, and recover.</text>

</svg>
