<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu GitHub profile hero</title>
  <desc id="desc">A richer visual banner for Terry Yu's GitHub author page, highlighting readable, reviewable, evidence-backed AI products, the front row three, and the six-signal pin system.</desc>
  <defs>
    <linearGradient id="bg" x1="54" y1="30" x2="1220" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.46" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="96" y1="74" x2="1160" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="teal" x1="875" y1="52" x2="1170" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="blue" x1="826" y1="28" x2="1196" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="violet" x1="906" y1="18" x2="1218" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <rect x="24" y="20" width="1232" height="380" rx="34" fill="url(#bg)"/>
  <rect x="54" y="50" width="1172" height="320" rx="28" fill="url(#panel)" stroke="#1F2937"/>

  <circle cx="1046" cy="112" r="126" fill="url(#violet)" fill-opacity="0.22"/>
  <circle cx="1114" cy="236" r="96" fill="url(#blue)" fill-opacity="0.20"/>
  <circle cx="914" cy="278" r="62" fill="url(#teal)" fill-opacity="0.18"/>

  <rect x="92" y="82" width="208" height="34" rx="17" fill="#09111C" stroke="#334155"/>
  <text x="116" y="104" fill="#E2E8F0" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700">author page • Seattle • builder</text>

  <text x="92" y="162" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="54" font-weight="800">Terry Yu</text>
  <text x="92" y="204" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700">Readable, reviewable, evidence-backed AI products</text>
  <text x="92" y="238" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="600">Local-first systems for reading, deciding, orchestrating, and proving work.</text>

  <rect x="92" y="270" width="118" height="28" rx="14" fill="#0B1220" stroke="#1F2937"/>
  <rect x="222" y="270" width="128" height="28" rx="14" fill="#0B1220" stroke="#1F2937"/>
  <rect x="362" y="270" width="168" height="28" rx="14" fill="#0B1220" stroke="#1F2937"/>
  <text x="126" y="288" fill="#99F6E4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800">READ</text>
  <text x="258" y="288" fill="#BFDBFE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800">DECIDE</text>
  <text x="392" y="288" fill="#DDD6FE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="800">ORCHESTRATE</text>

  <rect x="92" y="318" width="220" height="30" rx="15" fill="#111827" stroke="#1F2937"/>
  <rect x="326" y="318" width="210" height="30" rx="15" fill="#111827" stroke="#1F2937"/>
  <rect x="550" y="318" width="242" height="30" rx="15" fill="#111827" stroke="#1F2937"/>
  <text x="114" y="338" fill="#99F6E4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">SOURCEHARBOR • FRONT ROW</text>
  <text x="348" y="338" fill="#BFDBFE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">CAMPUS-COPILOT • FRONT ROW</text>
  <text x="572" y="338" fill="#DDD6FE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">CORTEXPILOT • FRONT ROW</text>

  <rect x="844" y="98" width="304" height="194" rx="24" fill="#0B1220" fill-opacity="0.82" stroke="#334155"/>
  <text x="870" y="132" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800">First-screen signals</text>
  <text x="870" y="162" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Read the world</text>
  <text x="870" y="184" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Real-world decision systems</text>
  <text x="870" y="206" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Operator control and orchestration</text>
  <text x="870" y="228" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Runtime kernel foundations</text>
  <text x="870" y="250" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Consumer product families</text>
  <text x="870" y="272" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Instantly understandable AI hooks</text>

</svg>
