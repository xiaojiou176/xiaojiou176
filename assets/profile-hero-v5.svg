<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu GitHub profile hero v5</title>
  <desc id="desc">Minimal editorial hero for Terry Yu with strong author identity, three front-row doors, and a restrained proof-first aesthetic.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#EEE4D5"/>
    </linearGradient>
    <linearGradient id="door1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="door2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="door3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3730A3"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="1560" height="520" rx="36" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="520" rx="36" stroke="#1C1917" stroke-width="2"/>

  <circle cx="1334" cy="130" r="88" fill="#C4B5FD" fill-opacity="0.44"/>
  <circle cx="1452" cy="204" r="116" fill="#BFDBFE" fill-opacity="0.4"/>
  <circle cx="1284" cy="334" r="92" fill="#99F6E4" fill-opacity="0.38"/>

  <rect x="88" y="78" width="160" height="32" rx="16" fill="#111827"/>
  <text x="114" y="99" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.6">AUTHOR PAGE</text>

  <text x="88" y="186" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700">Terry Yu</text>
  <text x="88" y="264" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">Readable, reviewable</text>
  <text x="88" y="330" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700">AI products</text>
  <text x="90" y="386" fill="#44403C" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600">Read  •  Decide  •  Orchestrate</text>

  <line x1="88" y1="430" x2="622" y2="430" stroke="#1C1917" stroke-width="2"/>
  <text x="88" y="468" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.6">START WITH THE FRONT ROW</text>
  <text x="88" y="500" fill="#44403C" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500">SourceHarbor  •  campus-copilot  •  CortexPilot-public</text>

  <rect x="986" y="86" width="160" height="310" rx="32" fill="url(#door1)"/>
  <rect x="1172" y="130" width="160" height="266" rx="32" fill="url(#door2)"/>
  <rect x="1358" y="66" width="160" height="330" rx="32" fill="url(#door3)"/>

  <text x="1035" y="436" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="1.4">READ</text>
  <text x="1210" y="436" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="1.4">DECIDE</text>
  <text x="1380" y="436" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="1.4">ORCHESTRATE</text>
</svg>
