<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu GitHub author-page hero</title>
  <desc id="desc">Author-page hero for Terry Yu that keeps a light, GitHub-native systems feel while showing how messy inputs become readable, reviewable work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFBF7"/>
      <stop offset="1" stop-color="#F3EEE5"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#E8E0D2" stroke-width="1"/>
    </pattern>
    <linearGradient id="route" x1="760" y1="0" x2="1460" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.35" stop-color="#0891B2"/>
      <stop offset="0.68" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1560" height="600" rx="36" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="600" rx="36" stroke="#C9C0B3" stroke-width="1.5"/>
  <rect x="20" y="20" width="1560" height="600" rx="36" fill="url(#grid)" opacity="0.55"/>

  <circle cx="1308" cy="162" r="72" fill="#C4B5FD" fill-opacity="0.10"/>
  <circle cx="1420" cy="232" r="70" fill="#BFDBFE" fill-opacity="0.12"/>
  <circle cx="1218" cy="372" r="86" fill="#99F6E4" fill-opacity="0.10"/>

  <rect x="88" y="76" width="176" height="34" rx="17" fill="#111827"/>
  <text x="114" y="98" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">AUTHOR PAGE</text>

  <text x="88" y="182" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700">Terry Yu</text>
  <text x="88" y="252" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700">Readable systems</text>
  <text x="88" y="308" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700">for real decisions</text>

  <text x="90" y="382" fill="#4B5563" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Messy inputs become work people can actually read, review, and trust.</text>
  <text x="90" y="424" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.7">SEATTLE, WA (PT)</text>
  <text x="90" y="476" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Start with the thesis here. Follow the product universe next.</text>

  <text x="844" y="110" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1.6">WORKFLOW THESIS</text>

  <path d="M828 188 C900 188, 962 188, 1036 188" stroke="url(#route)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="10 12"/>
  <path d="M1036 188 C1120 188, 1160 188, 1238 236" stroke="url(#route)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="10 12"/>
  <path d="M1238 236 C1290 276, 1332 318, 1424 318" stroke="url(#route)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="10 12"/>
  <path d="M1238 236 C1300 220, 1372 190, 1424 162" stroke="url(#route)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="10 12"/>

  <g filter="url(#shadow)">
    <rect x="812" y="154" width="214" height="66" rx="22" fill="#FFFFFF" fill-opacity="0.72" stroke="#C9C0B3" stroke-width="1.5"/>
    <rect x="1036" y="154" width="194" height="66" rx="22" fill="#FFFFFF" fill-opacity="0.78" stroke="#C9C0B3" stroke-width="1.5"/>
    <rect x="1238" y="142" width="170" height="66" rx="22" fill="#FFFFFF" fill-opacity="0.82" stroke="#C9C0B3" stroke-width="1.5"/>
    <rect x="1238" y="286" width="170" height="66" rx="22" fill="#FFFFFF" fill-opacity="0.82" stroke="#C9C0B3" stroke-width="1.5"/>
    <rect x="1420" y="142" width="120" height="210" rx="28" fill="#FFFFFF" fill-opacity="0.85" stroke="#C9C0B3" stroke-width="1.5"/>
  </g>

  <circle cx="842" cy="178" r="6" fill="#0F766E"/>
  <circle cx="1064" cy="178" r="6" fill="#0891B2"/>
  <circle cx="1266" cy="166" r="6" fill="#2563EB"/>
  <circle cx="1266" cy="310" r="6" fill="#2563EB"/>
  <circle cx="1450" cy="170" r="6" fill="#3730A3"/>
  <circle cx="1450" cy="318" r="6" fill="#3730A3"/>

  <text x="858" y="176" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">MESSY INPUTS</text>
  <text x="858" y="198" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">source streams, notes, tasks</text>

  <text x="1080" y="176" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">READ</text>
  <text x="1080" y="198" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">turn noise into artifacts</text>

  <text x="1282" y="164" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">DECIDE</text>
  <text x="1282" y="186" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">see what matters first</text>

  <text x="1282" y="308" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">EXECUTE</text>
  <text x="1282" y="330" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">move with review in place</text>

  <text x="1468" y="188" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" transform="rotate(90 1468 188)">PROVE</text>
  <text x="1498" y="178" fill="#6B7280" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" transform="rotate(90 1498 178)">keep evidence close to the claim</text>
</svg>
