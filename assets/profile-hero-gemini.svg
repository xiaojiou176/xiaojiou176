<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="auto">
  <defs>
    <style>
      /* 自适应暗色模式材质 (Adaptive Material) */
      :root {
        --text-primary: #1f2328;
        --text-secondary: #656d76;
        --border-color: #d0d7de;
        --accent: #0969da;
        --bg-card: #ffffff;
        --trace-color: rgba(9, 105, 218, 0.4);
        --grid-color: rgba(31, 35, 40, 0.04);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text-primary: #e6edf3;
          --text-secondary: #7d8590;
          --border-color: #30363d;
          --accent: #58a6ff;
          --bg-card: #0d1117;
          --trace-color: rgba(88, 166, 255, 0.3);
          --grid-color: rgba(230, 237, 243, 0.04);
        }
      }
      
      /* 字体与排版约束 */
      .text-primary { fill: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .text-secondary { fill: var(--text-secondary); font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; font-size: 11px; }
      .card-bg { fill: var(--bg-card); stroke: var(--border-color); stroke-width: 1; rx: 6; }
      .accent-line { stroke: var(--accent); stroke-width: 1.5; fill: none; }
      .trace-text { fill: var(--trace-color); font-family: SFMono-Regular, Consolas, monospace; font-size: 12px; font-weight: 600; }

      /* 心电图式非线性动力学 (Non-linear Dynamics) */
      @keyframes ekg-pulse {
        0% { stroke-dashoffset: 600; opacity: 0; }
        10% { opacity: 1; }
        35% { stroke-dashoffset: 300; animation-timing-function: cubic-bezier(0.8, 0, 0.2, 1); }
        55% { stroke-dashoffset: 300; /* 系统处理的有意识停顿 */ }
        85% { stroke-dashoffset: 0; opacity: 1; animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1); }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }

      /* 日志碎片滚动 (Physical Presence) */
      @keyframes log-scroll {
        0% { transform: translateY(0); opacity: 0; }
        15% { opacity: 1; }
        70% { opacity: 1; }
        100% { transform: translateY(-30px); opacity: 0; }
      }

      /* 动画绑定 */
      .pulse-line {
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: ekg-pulse 4s infinite;
      }
      .log-stream { animation: log-scroll 3s cubic-bezier(0.1, 0.9, 0.2, 1) infinite; }
      .log-stream-delay { animation: log-scroll 3s cubic-bezier(0.1, 0.9, 0.2, 1) 1.5s infinite; opacity: 0; }
    </style>

    /* 背景微型网格 (Control Plane 质感) */
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="var(--grid-color)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#grid)" />

  <g transform="translate(50, 215)">
    <text class="trace-text log-stream">[TRACE_ID: 0x9A4F] POST /v1/orchestrate -&gt; 200 OK</text>
    <text class="trace-text log-stream-delay">[SYSTEM_LOG] Verifying proof... L0 control plane synced.</text>
  </g>

  <path d="M 170 115 L 630 115" class="accent-line" opacity="0.2" />
  <path d="M 170 115 L 630 115" class="accent-line pulse-line" />

  <g transform="translate(90, 65)">
    <rect width="170" height="100" class="card-bg" />
    <circle cx="20" cy="22" r="4" fill="var(--accent)" />
    <text x="35" y="26" class="text-primary" font-weight="600" font-size="15">SourceHarbor</text>
    <text x="20" y="55" class="text-secondary">■ READ_LANE</text>
    <text x="20" y="72" class="text-secondary">Knowledge Artifacts</text>
    <text x="20" y="90" class="text-secondary"># Not generic RSS</text>
  </g>

  <g transform="translate(315, 65)">
    <rect width="170" height="100" class="card-bg" />
    <circle cx="20" cy="22" r="4" fill="var(--accent)" />
    <text x="35" y="26" class="text-primary" font-weight="600" font-size="15">OpenCampus</text>
    <text x="20" y="55" class="text-secondary">■ DECIDE_LANE</text>
    <text x="20" y="72" class="text-secondary">High-Constraint Logic</text>
    <text x="20" y="90" class="text-secondary"># Review-first</text>
  </g>

  <g transform="translate(540, 65)">
    <rect width="170" height="100" class="card-bg" />
    <circle cx="20" cy="22" r="4" fill="var(--accent)" />
    <text x="35" y="26" class="text-primary" font-weight="600" font-size="15">OpenVibeCoding</text>
    <text x="20" y="55" class="text-secondary">■ ORCHESTRATE_LANE</text>
    <text x="20" y="72" class="text-secondary">L0 Control Plane</text>
    <text x="20" y="90" class="text-secondary"># Governed execution</text>
  </g>
</svg>
