<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu GitHub author-page hero</title>
  <desc id="desc">Author-page hero for Terry Yu that visualizes how messy inputs become readable, reviewable, proof-backed work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EC"/>
      <stop offset="1" stop-color="#E9DDCD"/>
    </linearGradient>
    <linearGradient id="routeA" x1="760" y1="0" x2="1460" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.35" stop-color="#0891B2"/>
      <stop offset="0.68" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="routeB" x1="760" y1="0" x2="1460" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="cardInk" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1560" height="600" rx="40" fill="url(#bg)"/>
  <rect x="20" y="20" width="1560" height="600" rx="40" stroke="#1C1917" stroke-width="2"/>

  <circle cx="1334" cy="162" r="92" fill="#C4B5FD" fill-opacity="0.18"/>
  <circle cx="1462" cy="232" r="88" fill="#BFDBFE" fill-opacity="0.22"/>
  <circle cx="1244" cy="356" r="106" fill="#99F6E4" fill-opacity="0.20"/>

  <rect x="88" y="76" width="176" height="34" rx="17" fill="#111827"/>
  <text x="114" y="98" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.7">AUTHOR PAGE</text>

  <text x="88" y="186" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="700">Terry Yu</text>
  <text x="88" y="264" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700">Readable systems</text>
  <text x="88" y="324" fill="#111827" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700">for real decisions</text>

  <text x="90" y="390" fill="#44403C" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Messy inputs become work people can actually read, review, and trust.</text>
  <text x="90" y="430" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="1.7">SEATTLE, WA (PT)</text>
  <text x="90" y="484" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Start with the thesis here. Follow the product universe next.</text>

  <text x="830" y="106" fill="#44403C" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="1.5">WORKFLOW THESIS</text>

  <path d="M820 180 C910 180, 960 180, 1030 180" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 14"/>
  <path d="M1030 180 C1110 180, 1160 180, 1234 236" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 14"/>
  <path d="M1234 236 C1290 278, 1340 320, 1430 320" stroke="url(#routeB)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 14"/>
  <path d="M1234 236 C1290 220, 1360 190, 1430 168" stroke="url(#routeA)" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 14"/>

  <g filter="url(#shadow)">
    <rect x="810" y="146" width="210" height="70" rx="26" fill="url(#cardInk)"/>
    <rect x="1030" y="146" width="210" height="70" rx="26" fill="url(#cardInk)"/>
    <rect x="1234" y="134" width="178" height="70" rx="26" fill="url(#cardInk)"/>
    <rect x="1234" y="286" width="178" height="70" rx="26" fill="url(#cardInk)"/>
    <rect x="1420" y="134" width="120" height="220" rx="30" fill="url(#cardInk)"/>
  </g>

  <text x="842" y="175" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">MESSY INPUTS</text>
  <text x="842" y="197" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">source streams, notes, tasks</text>

  <text x="1074" y="175" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">READ</text>
  <text x="1074" y="197" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">turn noise into artifacts</text>

  <text x="1262" y="164" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">DECIDE</text>
  <text x="1262" y="186" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">see what matters first</text>

  <text x="1262" y="316" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">EXECUTE</text>
  <text x="1262" y="338" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">move with review in place</text>

  <text x="1452" y="184" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" transform="rotate(90 1452 184)">PROVE</text>
  <text x="1484" y="174" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" transform="rotate(90 1484 174)">keep evidence close to the claim</text>

  <circle cx="1030" cy="180" r="9" fill="#0F766E"/>
  <circle cx="1234" cy="236" r="9" fill="#0891B2"/>
  <circle cx="1430" cy="168" r="9" fill="#2563EB"/>
  <circle cx="1430" cy="320" r="9" fill="#3730A3"/>
</svg>
