<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terry Yu profile hero</title>
  <desc id="desc">A visual banner for Terry Yu's GitHub profile, highlighting local-first AI systems, browser automation, traceable research, and operator-grade workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="28" x2="1156" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accentA" x1="206" y1="24" x2="498" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="accentB" x1="822" y1="60" x2="1142" y2="288" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="accentC" x1="902" y1="16" x2="1194" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="24" y="20" width="1232" height="320" rx="32" fill="url(#bg)"/>
  </g>

  <circle cx="1038" cy="102" r="120" fill="url(#accentC)" fill-opacity="0.22"/>
  <circle cx="1098" cy="226" r="94" fill="url(#accentB)" fill-opacity="0.22"/>
  <circle cx="920" cy="246" r="56" fill="url(#accentA)" fill-opacity="0.18"/>
  <circle cx="1140" cy="154" r="26" fill="#F8FAFC" fill-opacity="0.08"/>
  <circle cx="1010" cy="250" r="18" fill="#F8FAFC" fill-opacity="0.08"/>
  <circle cx="1168" cy="248" r="14" fill="#F8FAFC" fill-opacity="0.08"/>

  <rect x="92" y="82" width="176" height="36" rx="18" fill="#0B1220" fill-opacity="0.84" stroke="#334155"/>
  <text x="120" y="105" fill="#E2E8F0" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="600">Seattle • builder profile</text>

  <text x="92" y="168" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800">Terry Yu</text>
  <text x="92" y="208" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">Local-first AI systems for browser automation,</text>
  <text x="92" y="242" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600">traceable research, and operator-grade workflows.</text>

  <rect x="92" y="274" width="220" height="28" rx="14" fill="#111827" stroke="#1F2937"/>
  <rect x="324" y="274" width="220" height="28" rx="14" fill="#111827" stroke="#1F2937"/>
  <rect x="556" y="274" width="208" height="28" rx="14" fill="#111827" stroke="#1F2937"/>

  <text x="114" y="293" fill="#99F6E4" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">LOCAL-FIRST PRODUCTS</text>
  <text x="346" y="293" fill="#BFDBFE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">EVIDENCE-FIRST FLOWS</text>
  <text x="578" y="293" fill="#DDD6FE" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">HOSTED-FIRST PUBLIC CI</text>

  <rect x="846" y="78" width="286" height="72" rx="20" fill="#0B1220" fill-opacity="0.72" stroke="#334155"/>
  <text x="872" y="110" fill="#94A3B8" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700">PUBLIC SIGNAL</text>
  <text x="872" y="136" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800">13 open repos</text>

  <rect x="888" y="180" width="238" height="106" rx="22" fill="#0B1220" fill-opacity="0.76" stroke="#334155"/>
  <text x="916" y="212" fill="#94A3B8" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700">PORTFOLIO SIGNALS</text>
  <text x="916" y="240" fill="#F8FAFC" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">Control planes</text>
  <text x="916" y="264" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Auditable browser workflows</text>
  <text x="916" y="288" fill="#CBD5E1" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600">Traceable research systems</text>
</svg>
